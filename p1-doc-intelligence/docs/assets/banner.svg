    <text x="280" y="196" fill="#475569">·</text>
    <text x="296" y="196">PostgreSQL</text>
    <text x="404" y="196" fill="#475569">·</text>
    <text x="420" y="196">Gemini</text>
    <text x="498" y="196" fill="#475569">·</text>
