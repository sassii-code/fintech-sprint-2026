name: Keep Render backend awake

on:
  schedule:
    - cron: "*/14 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 https://fintech-sprint-2026.onrender.com/health)
          echo "Response status: $status"
          if [ "$status" != "200" ]; then
            echo "::warning::Health check returned $status (backend may have been cold-starting)"
          fi
